[workspace]
authors = ["avcopan <avcopan@gmail.com>"]
channels = ["conda-forge"]
name = "pig-latin"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
build = "maturin develop --release --uv"
start = "python example/run.py"

[dependencies]
maturin = ">=1.12.6,<2"
rust = ">=1.94.0,<1.95"
python = ">=3.14.3,<3.15"
polars = ">=1.39.3,<2"
uv = ">=0.10.12,<0.11"
gcc = ">=15.2.0,<15.3"
