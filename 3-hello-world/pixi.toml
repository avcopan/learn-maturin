[workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "win-64"]
preview = ["pixi-build"]

[tasks]
start = 'python -m hello_world'

[dependencies]
hello_world = { path = "." }
python = "*"

[package]
name = "hello_world"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-python", version = "*" }
config = { compilers = ["rust"] }

[package.host-dependencies]
maturin = "*"
